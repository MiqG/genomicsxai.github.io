name: Deploy Hugo Site

on:
  push:
    branches:
      - main
    paths-ignore:
      - 'data/zenodo.json'
  workflow_dispatch:
    inputs:
      blog_post_paths:
        description: "Space-separated list of content/blogs/*/index.md paths to sync with Zenodo"
        required: false
        type: string
      zenodo_dry_run:
        description: "If true, log intended Zenodo sync actions without creating records"
        required: false
        default: true
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
      discussions: write
    environment:
      name: github-pages

    steps:
      # 1. Checkout the repo (with submodules for theme)
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      # 2. Setup Hugo
      - uses: peaceiris/actions-hugo@v3
        with:
          extended: true

      # 2.4. Ensure a GitHub Discussion exists for each blog post (for Giscus likes/comments)
      - name: Ensure blog discussions
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/ensure-blog-discussions.sh
          ./.github/scripts/ensure-blog-discussions.sh

      # 2.4b. Export discussion URLs so "Discuss this post" and like/comment link to the right thread
      - name: Export blog discussion URLs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          chmod +x .github/scripts/export-blog-discussion-urls.sh
          ./.github/scripts/export-blog-discussion-urls.sh

      # 2.5. Fetch editorial board from GitHub team (optional: set GH_EDITORS_TOKEN with read:org)
      - name: Fetch editors from GitHub team
        env:
          GH_TOKEN: ${{ secrets.GH_EDITORS_TOKEN }}
          ORG: genomicsxai
          TEAM: editors
        run: |
          mkdir -p data
          if [ -z "$GH_TOKEN" ]; then
            echo '[]' > data/editors.json
            echo "No GH_EDITORS_TOKEN set; editorial board will be empty. Add a PAT with read:org to populate."
            exit 0
          fi
          PAGE=1
          ALL=""
          while true; do
            RES=$(curl -s -w "\n%{http_code}" -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/orgs/${ORG}/teams/${TEAM}/members?per_page=100&page=${PAGE}")
            CODE=$(echo "$RES" | tail -n1)
            BODY=$(echo "$RES" | sed '$d')
            if [ "$CODE" != "200" ]; then
              echo "GitHub API returned $CODE; writing empty editors list."
              echo '[]' > data/editors.json
              exit 0
            fi
            COUNT=$(echo "$BODY" | jq -r 'length')
            [ "$COUNT" -eq 0 ] && break
            if [ -z "$ALL" ]; then ALL="$BODY"; else ALL=$(printf '%s\n%s' "$ALL" "$BODY" | jq -s 'add'); fi
            [ "$COUNT" -lt 100 ] && break
            PAGE=$((PAGE+1))
          done
          # Fetch each member's profile for display name (GET /users/{login} returns .name)
          OUT="[]"
          for login in $(echo "$ALL" | jq -r '.[].login'); do
            USER=$(curl -s -H "Authorization: Bearer $GH_TOKEN" -H "Accept: application/vnd.github.v3+json" "https://api.github.com/users/${login}")
            NAME=$(echo "$USER" | jq -r '.name // empty')
            URL=$(echo "$USER" | jq -r '.html_url // empty')
            [ -z "$URL" ] && URL="https://github.com/${login}"
            ENTRY=$(jq -nc --arg login "$login" --arg url "$URL" --arg name "$NAME" '{login: $login, url: $url, name: (if $name == "" then null else $name end)}')
            OUT=$(echo "$OUT" "$ENTRY" | jq -s '.[0] + [.[1]]')
          done
          echo "$OUT" > data/editors.json
          echo "Fetched $(jq length data/editors.json) editor(s)."

      # 2.6. Sync Zenodo DOI metadata for accepted blog posts changed in this push
      - name: Detect changed blog posts
        id: changed_blogs
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.blog_post_paths }}" ]; then
              read -r -a files <<< "${{ github.event.inputs.blog_post_paths }}"
            else
              echo "No blog_post_paths input provided; nothing to sync."
              echo "count=0" >> "$GITHUB_OUTPUT"
              exit 0
            fi
          else
            BEFORE="${{ github.event.before }}"
            AFTER="${{ github.sha }}"
            mapfile -t files < <(git diff --name-only "$BEFORE" "$AFTER" -- 'content/blogs/*/index.md' | sort)
          fi
          if [ "${#files[@]}" -eq 0 ]; then
            echo "count=0" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          printf '%s\n' "${files[@]}" > /tmp/changed-blog-posts.txt
          echo "count=${#files[@]}" >> "$GITHUB_OUTPUT"
          echo "Changed blog posts:"
          cat /tmp/changed-blog-posts.txt

      - name: Sync Zenodo DOI metadata
        if: steps.changed_blogs.outputs.count != '0'
        env:
          ZENODO_API_TOKEN: ${{ secrets.ZENODO_API_TOKEN }}
          ZENODO_COMMUNITY: ${{ secrets.ZENODO_COMMUNITY }}
          SITE_URL: https://genomicsxai.github.io
          DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.zenodo_dry_run == 'true' && '1' || '0' }}
        run: |
          if [ -z "$ZENODO_API_TOKEN" ]; then
            echo "ZENODO_API_TOKEN is not configured; skipping Zenodo DOI sync."
            exit 0
          fi
          chmod +x .github/scripts/sync-zenodo-dois.rb
          ruby .github/scripts/sync-zenodo-dois.rb $(tr '\n' ' ' < /tmp/changed-blog-posts.txt)

      - name: Commit Zenodo metadata
        if: steps.changed_blogs.outputs.count != '0' && !(github.event_name == 'workflow_dispatch' && github.event.inputs.zenodo_dry_run == 'true')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if git diff --quiet -- data/zenodo.json; then
            echo "No Zenodo metadata changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/zenodo.json
          git commit -m "chore: sync Zenodo DOI metadata"
          git push

      # 3. Build the Hugo site
      - name: Build
        run: hugo --minify

      # 3.5. Verify build output
      - name: List built files
        run: |
          echo "Build output directory contents:"
          ls -la public/ || echo "public directory not found!"
          echo ""
          echo "Checking for index.html:"
          ls -la public/index.html || echo "index.html not found!"
          echo ""
          echo "First few files in public:"
          find public -type f -name "*.html" | head -10

      # 4. Deploy to GitHub Pages
      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          # Use PAT to bypass branch protection rules
          # Fallback to GITHUB_TOKEN if PAT is not set
          github_token: ${{ secrets.GH_PAGES_TOKEN || secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          # keep_files: true preserves the previews/ subdirectory across deploys
          keep_files: true
